server:
  addr: ":8888"
  read_timeout: 600s
  write_timeout: 600s
  idle_timeout: 600s

tls:
  insecure_skip_verify: false  # TEST ONLY — disables origin+proxy cert verification

health:
  mode: connect                # connect (full tunnel probe) | tcp (plain TCP ping)
  interval: 5s
  timeout: 2s
  failure_threshold: 3
  recovery_threshold: 2

# Per-proxy basic-auth is embedded in `host` as "login:password@hostname[:port]".
# Use ${VAR} to keep secrets out of the file (expanded from env at load); each proxy
# can carry its own credentials.
sets:
  - name: openrouter
    origin: https://openrouter.ai
    pool:
      min: 20
      max: 100
    proxies:
      - host: ${FI01_CRED}@fwd-fi-01.msndr.net   # ${FI01_CRED} = "user:pass"
      - host: ${FI02_CRED}@fwd-fi-02.msndr.net
      - host: ${DE03_CRED}@fwd-de-03.msndr.net
      - host: ${NL04_CRED}@fwd-nl-04.msndr.net

  - name: openai
    origin: https://api.openai.com
    pool:
      min: 20
      max: 100
    proxies:
      - host: ${NL04_CRED}@fwd-nl-04.msndr.net
      - host: ${NL05_CRED}@fwd-nl-05.msndr.net
      - host: ${SE06_CRED}@fwd-se-06.msndr.net

  - name: vertexai
    origin: https://aiplatform.googleapis.com
    pool:
      min: 20
      max: 100
    proxies:
      - host: ${NL04_CRED}@fwd-nl-04.msndr.net
      - host: ${NL05_CRED}@fwd-nl-05.msndr.net
      - host: ${DE03_CRED}@fwd-de-03.msndr.net
