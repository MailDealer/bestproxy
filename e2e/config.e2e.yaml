server:
  addr: ":8888"
  read_timeout: 600s
  write_timeout: 600s
  idle_timeout: 600s

failover:
  max_attempts: 3
  max_buffer_bytes: 10485760

# Self-signed origin + plaintext (http) CONNECT proxies — test only.
tls:
  insecure_skip_verify: true

health:
  mode: connect
  interval: 3s
  timeout: 2s
  failure_threshold: 2
  recovery_threshold: 1

sets:
  - name: openrouter
    origin: https://origin
    pool:
      min: 2
      max: 10
    proxies:
      - host: e2euser:e2epass@fwd1
        port: 8888
        scheme: http
      - host: e2euser:e2epass@fwd2
        port: 8888
        scheme: http
